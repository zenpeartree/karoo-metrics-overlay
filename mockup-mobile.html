<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karoo Metrics Overlay - Mobile POV Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --text-main: rgba(255, 255, 255, 0.96);
    --text-soft: rgba(255, 255, 255, 0.84);
    --text-dim: rgba(255, 255, 255, 0.62);
    --power: #f6ca52;
    --hr: #58dfa2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
  body {
    display: grid; place-items: center;
    background: radial-gradient(circle at top left, rgba(23,198,181,0.12), transparent 28%), radial-gradient(circle at bottom right, rgba(111,184,255,0.12), transparent 30%), linear-gradient(180deg, #0f161c, #090d11);
    font-family: 'IBM Plex Sans', sans-serif; color: var(--text-main);
  }
  .phone {
    position: relative; width: min(390px, 92vw); aspect-ratio: 9 / 19.5; padding: 14px; border-radius: 38px; background: #05080b;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .phone::before {
    content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 34%; height: 24px; border-radius: 0 0 16px 16px; background: #05080b; z-index: 5;
  }
  .screen {
    position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 28px;
    background: linear-gradient(180deg, rgba(10,15,19,0.08), rgba(10,15,19,0.3)), url('Pov Cycling at Sunset.png') center/cover no-repeat;
  }
  .hud {
    position: absolute; left: 14px; top: 14px; bottom: 12px; width: 132px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .hud-top, .metrics-shell, .speed-shell, .secondary-shell, .terrain-panel, .grade-shell { display: grid; }
  .hud-top, .metrics-shell { gap: 14px; }
  .secondary-shell { gap: 9px; width: 112px; }
  .map-panel {
    width: 102px; padding: 6px; border-radius: 3px; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(6px);
  }
  .map-shell { position: relative; width: 100%; aspect-ratio: 1 / 0.94; overflow: hidden; }
  .map-gradient {
    position: absolute; inset: 0; z-index: 450; pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent 34%), linear-gradient(0deg, rgba(0,0,0,0.18), transparent 28%);
  }
  #map { width: 100%; height: 100%; filter: saturate(0.78) contrast(1.04) brightness(0.96); }
  .metric-block, .speed-shell, .terrain-panel {
    display: grid; gap: 2px; text-shadow: 0 1px 2px rgba(0,0,0,0.34), 0 6px 20px rgba(0,0,0,0.2);
  }
  .metric-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; line-height: 0.92; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .metric-value {
    font-family: 'Barlow Condensed', sans-serif; font-size: 40px; font-weight: 700; line-height: 0.82; letter-spacing: 0.01em; font-variant-numeric: tabular-nums;
  }
  .metric-value.compact { font-size: 31px; }
  .metric-sub {
    min-height: 10px; font-size: 8px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-dim);
  }
  .zone-bar { width: 54px; height: 3px; border-radius: 999px; background: rgba(255,255,255,0.16); overflow: hidden; }
  .zone-bar-fill { height: 100%; border-radius: inherit; }
  .grade-shell { gap: 3px; width: 120px; }
  .grade-track { position: relative; width: 100%; height: 14px; }
  .grade-track::before {
    content: ''; position: absolute; left: 2px; right: 18px; bottom: 6px; border-top: 2px solid rgba(255,255,255,0.82); transform: skewX(34deg); transform-origin: left bottom;
  }
  .grade-main { display: flex; align-items: flex-end; gap: 4px; }
  .grade-value { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 700; line-height: 0.84; }
  .grade-unit { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; line-height: 1; padding-bottom: 4px; text-transform: uppercase; }
  .ride-meta { display: grid; gap: 4px; width: 140px; }
  .meta-chip { font-size: 8px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-soft); }
  .meta-chip strong { color: var(--text-main); }
  .leaflet-control-attribution, .leaflet-control-zoom { display: none; }
  .rider-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f7fffd, #25d6c4 56%, #0b766d 100%);
    border: 2px solid rgba(255,255,255,0.92);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="hud">
        <div class="hud-top">
          <div class="map-panel">
            <div class="map-shell">
              <div class="map-gradient"></div>
              <div id="map"></div>
            </div>
          </div>
          <div class="metrics-shell">
            <div class="speed-shell">
              <div class="metric-label">KM/H</div>
              <div class="metric-value">68</div>
              <div class="metric-sub">Avg 41.2 km/h</div>
            </div>
            <div class="secondary-shell">
              <div class="metric-block">
                <div class="metric-label">Power</div>
                <div class="metric-value compact" style="color: var(--power);">0</div>
                <div class="zone-bar"><div class="zone-bar-fill" style="width:0%; background: linear-gradient(90deg, #eab308, rgba(255,255,255,0.95));"></div></div>
                <div class="metric-sub" style="color: var(--power);">Coasting</div>
                <div class="metric-sub">Avg 238 W</div>
              </div>
              <div class="metric-block">
                <div class="metric-label">HR</div>
                <div class="metric-value compact" style="color: var(--hr);">157</div>
                <div class="zone-bar"><div class="zone-bar-fill" style="width:64%; background: linear-gradient(90deg, #22c55e, rgba(255,255,255,0.95));"></div></div>
                <div class="metric-sub" style="color: var(--hr);">Z3 Tempo</div>
              </div>
              <div class="metric-block">
                <div class="metric-label">Cadence</div>
                <div class="metric-value compact">0</div>
              </div>
            </div>
          </div>
        </div>
        <div class="terrain-panel">
          <div class="grade-shell">
            <div class="grade-track"></div>
            <div class="grade-main">
              <div class="grade-value">-8</div>
              <div class="grade-unit">%</div>
            </div>
          </div>
          <div class="ride-meta">
            <div class="meta-chip"><strong>38.6</strong> km</div>
            <div class="meta-chip">Avg 41.2 km/h</div>
            <div class="meta-chip">Avg 238 W</div>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
  var map = L.map('map', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, touchZoom: false }).setView([46.497, 9.838], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.polyline([[46.4986, 9.8138],[46.4994, 9.8194],[46.4996, 9.8252],[46.4982, 9.8318],[46.497, 9.838]], { color: '#ffffff', weight: 4, opacity: 0.92 }).addTo(map);
  var riderIcon = L.divIcon({ className: '', html: '<div class="rider-dot"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });
  L.marker([46.497, 9.838], { icon: riderIcon }).addTo(map);
</script>
</body>
</html>
