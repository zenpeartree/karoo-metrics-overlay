<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karoo Metrics Overlay - POV Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --text-main: rgba(255, 255, 255, 0.96);
    --text-soft: rgba(255, 255, 255, 0.84);
    --text-dim: rgba(255, 255, 255, 0.62);
    --panel-shadow: rgba(0, 0, 0, 0.18);
    --power: #f6ca52;
    --hr: #58dfa2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text-main);
    background:
      linear-gradient(180deg, rgba(12, 18, 24, 0.04), rgba(8, 12, 16, 0.16)),
      url('Pov Cycling at Sunset.png') center/cover no-repeat;
  }
  .hud {
    position: absolute;
    left: 24px;
    top: 24px;
    bottom: 18px;
    width: 180px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .hud-top, .metrics-shell, .speed-shell, .secondary-shell, .terrain-panel, .grade-shell { display: grid; }
  .hud-top, .metrics-shell { gap: 18px; }
  .secondary-shell { gap: 12px; width: 132px; }
  .map-panel {
    width: 146px; padding: 8px; border-radius: 3px;
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(6px); box-shadow: 0 16px 32px var(--panel-shadow);
  }
  .map-shell { position: relative; width: 100%; aspect-ratio: 1 / 0.94; overflow: hidden; }
  .map-gradient {
    position: absolute; inset: 0; z-index: 450; pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.12), transparent 34%),
      linear-gradient(0deg, rgba(0,0,0,0.18), transparent 28%);
  }
  #map { width: 100%; height: 100%; filter: saturate(0.78) contrast(1.04) brightness(0.96); }
  .metric-block, .speed-shell, .terrain-panel {
    display: grid; gap: 3px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.32), 0 6px 20px rgba(0,0,0,0.18);
  }
  .metric-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700; line-height: 0.92; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .metric-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 62px; font-weight: 700; line-height: 0.82; letter-spacing: 0.01em; font-variant-numeric: tabular-nums;
  }
  .metric-value.compact { font-size: 44px; }
  .metric-sub {
    min-height: 13px; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
  }
  .zone-bar { width: 72px; height: 3px; border-radius: 999px; background: rgba(255,255,255,0.16); overflow: hidden; }
  .zone-bar-fill { height: 100%; border-radius: inherit; }
  .grade-shell { gap: 4px; width: 172px; }
  .grade-track { position: relative; width: 100%; height: 18px; }
  .grade-track::before {
    content: ''; position: absolute; left: 2px; right: 22px; bottom: 7px;
    border-top: 2px solid rgba(255,255,255,0.82); transform: skewX(34deg); transform-origin: left bottom;
  }
  .grade-main { display: flex; align-items: flex-end; gap: 6px; }
  .grade-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 58px; font-weight: 700; line-height: 0.84; letter-spacing: 0.01em;
  }
  .grade-unit {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 700; line-height: 1; padding-bottom: 6px; text-transform: uppercase;
  }
  .ride-meta { display: flex; flex-wrap: wrap; gap: 7px 12px; width: 240px; }
  .meta-chip { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-soft); }
  .meta-chip strong { color: var(--text-main); }
  .leaflet-control-attribution, .leaflet-control-zoom { display: none; }
  .rider-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f7fffd, #25d6c4 56%, #0b766d 100%);
    border: 2px solid rgba(255,255,255,0.92);
    box-shadow: 0 0 0 7px rgba(23,198,181,0.12), 0 0 18px rgba(23,198,181,0.24);
  }
</style>
</head>
<body>
  <div class="hud">
    <div class="hud-top">
      <div class="map-panel">
        <div class="map-shell">
          <div class="map-gradient"></div>
          <div id="map"></div>
        </div>
      </div>
      <div class="metrics-shell">
        <div class="speed-shell">
          <div class="metric-label">KM/H</div>
          <div class="metric-value">68</div>
          <div class="metric-sub">Avg 41.2 km/h</div>
        </div>
        <div class="secondary-shell">
          <div class="metric-block">
            <div class="metric-label">Power</div>
            <div class="metric-value compact" style="color: var(--power);">0</div>
            <div class="zone-bar"><div class="zone-bar-fill" style="width:0%; background: linear-gradient(90deg, #eab308, rgba(255,255,255,0.95));"></div></div>
            <div class="metric-sub" style="color: var(--power);">Coasting</div>
            <div class="metric-sub">Avg 238 W</div>
          </div>
          <div class="metric-block">
            <div class="metric-label">HR</div>
            <div class="metric-value compact" style="color: var(--hr);">157</div>
            <div class="zone-bar"><div class="zone-bar-fill" style="width:64%; background: linear-gradient(90deg, #22c55e, rgba(255,255,255,0.95));"></div></div>
            <div class="metric-sub" style="color: var(--hr);">Z3 Tempo</div>
          </div>
          <div class="metric-block">
            <div class="metric-label">Cadence</div>
            <div class="metric-value compact">0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="terrain-panel">
      <div class="grade-shell">
        <div class="grade-track"></div>
        <div class="grade-main">
          <div class="grade-value">-8</div>
          <div class="grade-unit">%</div>
        </div>
      </div>
      <div class="ride-meta">
        <div class="meta-chip"><strong>38.6</strong> km</div>
        <div class="meta-chip">Avg 41.2 km/h</div>
        <div class="meta-chip">Avg 238 W</div>
      </div>
    </div>
  </div>
<script>
  var map = L.map('map', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, touchZoom: false }).setView([46.497, 9.838], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.polyline([[46.4986, 9.8138],[46.4994, 9.8194],[46.4996, 9.8252],[46.4982, 9.8318],[46.497, 9.838]], { color: '#ffffff', weight: 4, opacity: 0.92 }).addTo(map);
  var riderIcon = L.divIcon({ className: '', html: '<div class="rider-dot"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
  L.marker([46.497, 9.838], { icon: riderIcon }).addTo(map);
</script>
</body>
</html>
