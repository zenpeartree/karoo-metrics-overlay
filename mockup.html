<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karoo Metrics Overlay - Visual Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --shell-bg: rgba(8, 12, 16, 0.72);
    --shell-border: rgba(255, 255, 255, 0.1);
    --shell-glow: rgba(20, 184, 166, 0.22);
    --text-main: #f7fbfc;
    --text-soft: rgba(247, 251, 252, 0.72);
    --text-dim: rgba(247, 251, 252, 0.4);
    --power: #f5c542;
    --hr: #3ddc97;
    --climb: #ff6b57;
    --descent: #58c4dd;
    --neutral: #dce7eb;
    --accent: #17c6b5;
    --map-shadow: rgba(0, 0, 0, 0.34);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text-main);
    background:
      radial-gradient(circle at top left, rgba(23, 198, 181, 0.2), transparent 28%),
      radial-gradient(circle at top right, rgba(245, 197, 66, 0.16), transparent 24%),
      linear-gradient(135deg, rgba(15, 24, 31, 0.78), rgba(4, 8, 12, 0.5)),
      url('Cyclist POV 046.jpg') center/cover no-repeat;
  }

  .overlay {
    position: fixed;
    left: 26px;
    right: 26px;
    bottom: 26px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }

  .metrics-shell {
    position: relative;
    width: 468px;
    display: grid;
    gap: 10px;
  }

  .map-panel {
    position: relative;
    width: 320px;
    padding: 10px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(11, 17, 21, 0.72), rgba(6, 10, 14, 0.58));
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 18px 42px rgba(0, 0, 0, 0.26),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(18px);
  }

  .map-shell {
    position: relative;
    width: 100%;
    height: 218px;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
  }

  .map-gradient {
    position: absolute;
    inset: 0;
    z-index: 450;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(4, 8, 12, 0.2), transparent 35%),
      linear-gradient(0deg, rgba(4, 8, 12, 0.48), transparent 30%);
  }

  #map {
    width: 100%;
    height: 100%;
    filter: saturate(0.85) contrast(1.05) brightness(0.92);
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .metric-card {
    position: relative;
    padding: 14px 14px 12px;
    border-radius: 18px;
    background: var(--shell-bg);
    border: 1px solid var(--shell-border);
    backdrop-filter: blur(16px);
    box-shadow:
      0 16px 40px rgba(0, 0, 0, 0.22),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    overflow: hidden;
  }

  .metric-card::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.9;
  }

  .metric-card.power::before { background: var(--power); }
  .metric-card.hr::before { background: var(--hr); }
  .metric-card.grade::before { background: var(--climb); }
  .metric-card.speed::before { background: #6ebaff; }
  .metric-card.distance::before { background: #a78bfa; }
  .metric-card.avg::before { background: var(--neutral); }

  .metric-label {
    margin-bottom: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .metric-main {
    display: flex;
    align-items: flex-end;
    gap: 4px;
  }

  .metric-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    line-height: 0.88;
    letter-spacing: 0.02em;
  }

  .metric-unit {
    padding-bottom: 5px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-soft);
  }

  .metric-sub {
    margin-top: 10px;
    min-height: 18px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  .bar-track {
    margin-top: 10px;
    height: 5px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: inherit;
  }

  .power .metric-value,
  .power .metric-sub { color: var(--power); }

  .hr .metric-value,
  .hr .metric-sub { color: var(--hr); }

  .grade .metric-value.climb { color: var(--climb); }

  .leaflet-control-attribution,
  .leaflet-control-zoom {
    display: none;
  }

  .rider-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #d4fff5, #17c6b5 60%, #0b766d 100%);
    border: 2px solid rgba(255, 255, 255, 0.9);
    box-shadow:
      0 0 0 8px rgba(23, 198, 181, 0.12),
      0 0 24px rgba(23, 198, 181, 0.42);
  }

  @media (max-width: 700px) {
    .overlay {
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: grid;
    }

    .metrics-shell,
    .map-panel {
      width: auto;
    }

    .metrics-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>
<body>
  <section class="overlay">
    <div class="metrics-shell">
      <div class="metrics-grid">
        <article class="metric-card power">
          <div class="metric-label">Power</div>
          <div class="metric-main">
            <div class="metric-value">247</div>
            <div class="metric-unit">W</div>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:85%; background: linear-gradient(90deg, #e8bb3d, #f7dc80);"></div></div>
          <div class="metric-sub">Z4 Threshold</div>
        </article>

        <article class="metric-card hr">
          <div class="metric-label">Heart Rate</div>
          <div class="metric-main">
            <div class="metric-value">156</div>
            <div class="metric-unit">bpm</div>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:60%; background: linear-gradient(90deg, #26c880, #78efbc);"></div></div>
          <div class="metric-sub">Z3 Tempo</div>
        </article>

        <article class="metric-card grade">
          <div class="metric-label">Grade</div>
          <div class="metric-main">
            <div class="metric-value climb">+4.2</div>
            <div class="metric-unit">%</div>
          </div>
          <div class="metric-sub">Elev Gain 812 m</div>
        </article>

        <article class="metric-card speed">
          <div class="metric-label">Speed</div>
          <div class="metric-main">
            <div class="metric-value">28.4</div>
            <div class="metric-unit">km/h</div>
          </div>
          <div class="metric-sub">Avg 26.1 km/h</div>
        </article>

        <article class="metric-card distance">
          <div class="metric-label">Distance</div>
          <div class="metric-main">
            <div class="metric-value">42.7</div>
            <div class="metric-unit">km</div>
          </div>
          <div class="metric-sub">2h 01m elapsed</div>
        </article>

        <article class="metric-card avg">
          <div class="metric-label">Avg Power</div>
          <div class="metric-main">
            <div class="metric-value">218</div>
            <div class="metric-unit">W</div>
          </div>
          <div class="metric-sub">Controlled pacing</div>
        </article>
      </div>
    </div>

    <div class="map-panel">
      <div class="map-shell">
        <div class="map-gradient"></div>
        <div id="map"></div>
      </div>
    </div>
  </section>

<script>
  var routePoints = [
    [38.7870, -9.3900], [38.7865, -9.3920], [38.7858, -9.3942],
    [38.7850, -9.3960], [38.7842, -9.3980], [38.7835, -9.4000],
    [38.7828, -9.4018], [38.7820, -9.4038], [38.7812, -9.4055],
    [38.7805, -9.4075], [38.7798, -9.4095], [38.7790, -9.4112],
    [38.7782, -9.4130], [38.7775, -9.4148], [38.7768, -9.4168],
    [38.7760, -9.4185], [38.7752, -9.4202], [38.7745, -9.4220],
    [38.7738, -9.4238], [38.7730, -9.4255], [38.7722, -9.4272],
    [38.7715, -9.4290], [38.7708, -9.4308], [38.7700, -9.4325]
  ];

  var currentIndex = 14;

  var map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    touchZoom: false
  }).setView(routePoints[currentIndex], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  L.polyline(routePoints.slice(0, currentIndex + 1), {
    color: '#17c6b5',
    weight: 4,
    opacity: 0.95
  }).addTo(map);

  L.polyline(routePoints.slice(currentIndex), {
    color: '#c9f7f2',
    weight: 2,
    opacity: 0.3,
    dashArray: '6 8'
  }).addTo(map);

  var riderIcon = L.divIcon({
    className: '',
    html: '<div class="rider-dot"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });

  var riderMarker = L.marker(routePoints[currentIndex], { icon: riderIcon }).addTo(map);

  setInterval(function() {
    currentIndex = (currentIndex + 1) % routePoints.length;
    var pos = routePoints[currentIndex];
    riderMarker.setLatLng(pos);
    map.panTo(pos, { animate: true, duration: 1.2 });
  }, 2400);
</script>
</body>
</html>
