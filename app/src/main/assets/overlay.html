<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karoo Live Metrics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --text-main: rgba(255, 255, 255, 0.96);
    --text-soft: rgba(255, 255, 255, 0.84);
    --text-dim: rgba(255, 255, 255, 0.62);
    --panel-shadow: rgba(0, 0, 0, 0.18);
    --power: #f6ca52;
    --hr: #58dfa2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: transparent;
    color: var(--text-main);
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  .hud {
    position: absolute;
    left: 24px;
    top: 24px;
    bottom: 18px;
    width: min(25vw, 296px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .hud-top {
    display: grid;
    gap: 18px;
  }

  .map-panel {
    width: clamp(116px, 10vw, 148px);
    padding: 8px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(6px);
    box-shadow: 0 16px 32px var(--panel-shadow);
    display: none;
  }

  .map-panel.visible {
    display: block;
  }

  .map-shell {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 0.94;
    overflow: hidden;
    background: rgba(20, 20, 20, 0.18);
  }

  .map-gradient {
    position: absolute;
    inset: 0;
    z-index: 450;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 34%),
      linear-gradient(0deg, rgba(0, 0, 0, 0.18), transparent 28%);
  }

  #map {
    width: 100%;
    height: 100%;
    filter: saturate(0.78) contrast(1.04) brightness(0.96);
  }

  .map-fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 14px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-main);
    background: rgba(10, 14, 18, 0.58);
    z-index: 500;
  }

  .map-panel.unavailable .map-fallback {
    display: flex;
  }

  .metrics-shell,
  .speed-shell,
  .secondary-shell,
  .grade-shell {
    display: grid;
  }

  .metrics-shell {
    gap: 16px;
  }

  .speed-shell {
    gap: 3px;
    text-shadow:
      0 1px 2px rgba(0, 0, 0, 0.32),
      0 6px 20px rgba(0, 0, 0, 0.18);
  }

  .secondary-shell {
    gap: 12px;
    width: min(132px, 100%);
  }

  .metric-block {
    display: grid;
    gap: 3px;
    min-width: 0;
    text-shadow:
      0 1px 2px rgba(0, 0, 0, 0.32),
      0 6px 20px rgba(0, 0, 0, 0.18);
  }

  .metric-block.hidden {
    display: none;
  }

  .metric-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-main);
  }

  .metric-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(44px, 4.4vw, 62px);
    font-weight: 700;
    line-height: 0.82;
    letter-spacing: 0.01em;
    font-variant-numeric: tabular-nums;
    transition: opacity 0.15s ease;
  }

  .metric-value.compact {
    font-size: clamp(38px, 3.5vw, 46px);
  }

  .metric-value.updated {
    opacity: 0.72;
  }

  .metric-sub {
    min-height: 13px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .metric-sub.hidden {
    display: none;
  }

  .zone-bar {
    width: min(72px, 100%);
    height: 3px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.16);
    overflow: hidden;
    margin-top: 1px;
  }

  .zone-bar.hidden {
    display: none;
  }

  .zone-bar-fill {
    width: 0%;
    height: 100%;
    border-radius: inherit;
    transition: width 0.3s ease, background-color 0.3s ease;
  }

  .terrain-panel {
    display: grid;
    gap: 8px;
    text-shadow:
      0 1px 2px rgba(0, 0, 0, 0.32),
      0 6px 20px rgba(0, 0, 0, 0.18);
  }

  .grade-shell {
    gap: 4px;
    width: min(172px, 100%);
  }

  .grade-track {
    position: relative;
    width: 100%;
    height: 18px;
  }

  .grade-track::before {
    content: '';
    position: absolute;
    left: 2px;
    right: 22px;
    bottom: 7px;
    border-top: 2px solid rgba(255, 255, 255, 0.82);
    transform: skewX(34deg);
    transform-origin: left bottom;
  }

  .grade-main {
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }

  .grade-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(40px, 4.2vw, 58px);
    font-weight: 700;
    line-height: 0.84;
    letter-spacing: 0.01em;
    font-variant-numeric: tabular-nums;
  }

  .grade-unit {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    padding-bottom: 6px;
    text-transform: uppercase;
  }

  .ride-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 7px 12px;
    width: min(250px, 100%);
  }

  .meta-chip {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  .meta-chip.hidden {
    display: none;
  }

  .meta-chip strong {
    font-weight: 600;
    color: var(--text-main);
  }

  .status {
    position: fixed;
    left: 24px;
    bottom: 8px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.26);
  }

  .status.disconnected {
    color: rgba(255, 148, 148, 0.62);
  }

  .leaflet-control-attribution,
  .leaflet-control-zoom {
    display: none;
  }

  .rider-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f7fffd, #25d6c4 56%, #0b766d 100%);
    border: 2px solid rgba(255, 255, 255, 0.92);
    box-shadow:
      0 0 0 7px rgba(23, 198, 181, 0.12),
      0 0 18px rgba(23, 198, 181, 0.24);
  }
</style>
</head>
<body>
  <div class="overlay">
    <div class="hud">
      <div class="hud-top">
        <div class="map-panel" id="map-panel">
          <div class="map-shell">
            <div class="map-gradient"></div>
            <div id="map"></div>
            <div class="map-fallback" id="map-fallback">Map unavailable</div>
          </div>
        </div>

        <div class="metrics-shell">
          <div class="speed-shell">
            <div class="metric-label">KM/H</div>
            <div class="metric-value" id="speed">--</div>
            <div class="metric-sub" id="avgSpeed">Avg -- km/h</div>
          </div>

          <div class="secondary-shell" id="secondary-shell">
            <div class="metric-block" id="power-card">
              <div class="metric-label">Power</div>
              <div class="metric-value compact" id="power">--</div>
              <div class="zone-bar" id="power-bar-shell"><div class="zone-bar-fill" id="power-bar"></div></div>
              <div class="metric-sub" id="power-zone"></div>
              <div class="metric-sub" id="power-avg">Avg -- W</div>
            </div>

            <div class="metric-block" id="hr-card">
              <div class="metric-label">HR</div>
              <div class="metric-value compact" id="hr">--</div>
              <div class="zone-bar" id="hr-bar-shell"><div class="zone-bar-fill" id="hr-bar"></div></div>
              <div class="metric-sub" id="hr-zone"></div>
              <div class="metric-sub hidden" id="hr-sub-2"></div>
            </div>

            <div class="metric-block" id="cadence-card">
              <div class="metric-label">Cadence</div>
              <div class="metric-value compact" id="cadence">--</div>
              <div class="metric-sub hidden" id="cadence-sub"></div>
              <div class="metric-sub hidden" id="cadence-sub-2"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="terrain-panel">
        <div class="grade-shell">
          <div class="grade-track"></div>
          <div class="grade-main">
            <div class="grade-value" id="grade">--</div>
            <div class="grade-unit">%</div>
          </div>
        </div>

        <div class="ride-meta">
          <div class="meta-chip" id="dist-chip"><strong id="dist">--</strong> km</div>
          <div class="meta-chip" id="avg-speed-chip"><span id="avgSpeedMeta">Avg -- km/h</span></div>
          <div class="meta-chip" id="power-avg-chip"><span id="powerAvgMeta">Avg -- W</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="status" id="status"></div>

<script>
(function() {
  var FTP = 250;
  var MAX_HR = 187;
  var SHOW_MAP = false;
  var SHOW_POWER = true;
  var SHOW_HR = true;
  var SHOW_CADENCE = true;
  var MAX_TRAIL_POINTS = 250;
  var MAP_EDGE_PADDING = -0.35;

  var powerZones = [
    { name: 'Z1 Recovery', min: 0, max: 0.55, color: '#94a3b8' },
    { name: 'Z2 Endurance', min: 0.55, max: 0.75, color: '#3b82f6' },
    { name: 'Z3 Tempo', min: 0.75, max: 0.90, color: '#22c55e' },
    { name: 'Z4 Threshold', min: 0.90, max: 1.05, color: '#eab308' },
    { name: 'Z5 VO2max', min: 1.05, max: 1.20, color: '#f97316' },
    { name: 'Z6 Anaerobic', min: 1.20, max: 1.50, color: '#ef4444' },
    { name: 'Z7 Sprint', min: 1.50, max: 9.99, color: '#a855f7' }
  ];

  var hrZones = [
    { name: 'Z1 Recovery', min: 0, max: 0.60, color: '#94a3b8' },
    { name: 'Z2 Aerobic', min: 0.60, max: 0.70, color: '#3b82f6' },
    { name: 'Z3 Tempo', min: 0.70, max: 0.80, color: '#22c55e' },
    { name: 'Z4 Threshold', min: 0.80, max: 0.90, color: '#eab308' },
    { name: 'Z5 VO2max', min: 0.90, max: 1.00, color: '#ef4444' }
  ];

  function getZone(value, reference, zones) {
    var pct = value / reference;
    for (var i = zones.length - 1; i >= 0; i--) {
      if (pct >= zones[i].min) return zones[i];
    }
    return zones[0];
  }

  function getZoneFill(value, reference, zone) {
    var pct = value / reference;
    var range = zone.max - zone.min;
    if (range <= 0) return 100;
    var progress = (pct - zone.min) / range;
    return Math.min(Math.max(progress * 100, 15), 100);
  }

  var els = {
    speed: document.getElementById('speed'),
    avgSpeed: document.getElementById('avgSpeed'),
    avgSpeedMeta: document.getElementById('avgSpeedMeta'),
    power: document.getElementById('power'),
    powerCard: document.getElementById('power-card'),
    powerBar: document.getElementById('power-bar'),
    powerBarShell: document.getElementById('power-bar-shell'),
    powerZone: document.getElementById('power-zone'),
    powerAvg: document.getElementById('power-avg'),
    powerAvgMeta: document.getElementById('powerAvgMeta'),
    cadence: document.getElementById('cadence'),
    cadenceCard: document.getElementById('cadence-card'),
    hr: document.getElementById('hr'),
    hrCard: document.getElementById('hr-card'),
    hrBar: document.getElementById('hr-bar'),
    hrBarShell: document.getElementById('hr-bar-shell'),
    hrZone: document.getElementById('hr-zone'),
    dist: document.getElementById('dist'),
    grade: document.getElementById('grade'),
    status: document.getElementById('status'),
    mapPanel: document.getElementById('map-panel'),
    mapFallback: document.getElementById('map-fallback'),
    secondaryShell: document.getElementById('secondary-shell'),
    powerAvgChip: document.getElementById('power-avg-chip')
  };

  var map = null;
  var riderMarker = null;
  var routeTrail = null;
  var trailPoints = [];
  var mapReady = false;
  var mapUnavailable = false;
  var updateTimers = {};

  if (!SHOW_MAP && els.mapPanel && els.mapPanel.parentNode) {
    els.mapPanel.parentNode.removeChild(els.mapPanel);
    els.mapPanel = null;
  }

  if (!SHOW_POWER && els.powerCard && els.powerCard.parentNode) {
    els.powerCard.parentNode.removeChild(els.powerCard);
  }

  if (!SHOW_CADENCE && els.cadenceCard && els.cadenceCard.parentNode) {
    els.cadenceCard.parentNode.removeChild(els.cadenceCard);
  }

  if (!SHOW_HR && els.hrCard && els.hrCard.parentNode) {
    els.hrCard.parentNode.removeChild(els.hrCard);
  }

  function pulse(el) {
    if (!el) return;
    el.classList.add('updated');
    if (updateTimers[el.id]) {
      clearTimeout(updateTimers[el.id]);
    }
    updateTimers[el.id] = setTimeout(function() {
      el.classList.remove('updated');
    }, 150);
  }

  function setMetricValue(el, value, formatFn) {
    var display = value != null ? formatFn(value) : '--';
    if (el.textContent !== display) {
      el.textContent = display;
      pulse(el);
    }
  }

  function setMetricSub(el, text) {
    if (!el) return;
    if (el.textContent !== text) {
      el.textContent = text;
    }
  }

  function formatInteger(value) {
    return String(Math.round(value));
  }

  function formatOneDecimal(value) {
    return value.toFixed(1);
  }

  function formatSignedGrade(value) {
    var rounded = Math.round(value);
    return rounded > 0 ? '+' + rounded : String(rounded);
  }

  function showMapUnavailable(message) {
    if (!els.mapPanel) return;
    mapUnavailable = true;
    els.mapPanel.classList.add('visible');
    els.mapPanel.classList.add('unavailable');
    if (els.mapFallback) {
      els.mapFallback.textContent = message || 'Map unavailable';
    }
  }

  function initMap(lat, lng) {
    if (!SHOW_MAP || !els.mapPanel || mapUnavailable) return;
    if (mapReady) return;
    els.mapPanel.classList.add('visible');

    if (typeof L === 'undefined') {
      showMapUnavailable('Map library unavailable');
      return;
    }

    map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false
    }).setView([lat, lng], 11);

    var tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    });
    tileLayer.on('tileerror', function() {
      showMapUnavailable('Map tiles unavailable');
    });
    tileLayer.addTo(map);

    routeTrail = L.polyline([], {
      color: '#ffffff',
      weight: 4,
      opacity: 0.92
    }).addTo(map);

    var riderIcon = L.divIcon({
      className: '',
      html: '<div class="rider-dot"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });
    riderMarker = L.marker([lat, lng], { icon: riderIcon }).addTo(map);

    trailPoints = [[lat, lng]];
    routeTrail.setLatLngs(trailPoints);
    mapReady = true;
  }

  function shouldRecenterMap(pos) {
    if (!map) return false;
    var bounds = map.getBounds();
    if (!bounds || !bounds.isValid()) return true;
    return !bounds.pad(MAP_EDGE_PADDING).contains(pos);
  }

  function updateMap(lat, lng) {
    if (!SHOW_MAP || lat == null || lng == null || mapUnavailable) return;
    if (!mapReady) { initMap(lat, lng); return; }

    var pos = [lat, lng];
    riderMarker.setLatLng(pos);
    if (shouldRecenterMap(pos)) {
      map.panTo(pos, { animate: false });
    }

    var last = trailPoints[trailPoints.length - 1];
    if (!last || Math.abs(last[0] - lat) > 0.00005 || Math.abs(last[1] - lng) > 0.00005) {
      trailPoints.push(pos);
      if (trailPoints.length > MAX_TRAIL_POINTS) {
        trailPoints.shift();
      }
      routeTrail.setLatLngs(trailPoints);
    }
  }

  function updateMetrics(data) {
    setMetricValue(els.speed, data.speed, formatInteger);
    if (SHOW_POWER) {
      setMetricValue(els.power, data.power, formatInteger);
    }
    if (SHOW_CADENCE) {
      setMetricValue(els.cadence, data.cadence, formatInteger);
    }
    if (SHOW_HR) {
      setMetricValue(els.hr, data.hr, formatInteger);
    }
    setMetricValue(els.dist, data.dist, formatOneDecimal);

    if (data.avgSpeed != null) {
      var avgSpeedText = 'Avg ' + data.avgSpeed.toFixed(1) + ' km/h';
      setMetricSub(els.avgSpeed, avgSpeedText);
      setMetricSub(els.avgSpeedMeta, avgSpeedText);
    } else {
      setMetricSub(els.avgSpeed, 'Avg -- km/h');
      setMetricSub(els.avgSpeedMeta, 'Avg -- km/h');
    }

    if (SHOW_POWER) {
      if (data.avgPower != null) {
        var avgPowerText = 'Avg ' + Math.round(data.avgPower) + ' W';
        setMetricSub(els.powerAvg, avgPowerText);
        setMetricSub(els.powerAvgMeta, avgPowerText);
      } else {
        setMetricSub(els.powerAvg, 'Avg -- W');
        setMetricSub(els.powerAvgMeta, 'Avg -- W');
      }
    } else if (els.powerAvgChip) {
      els.powerAvgChip.classList.add('hidden');
    }

    if (data.grade != null) {
      var gradeText = formatSignedGrade(data.grade);
      if (els.grade.textContent !== gradeText) {
        els.grade.textContent = gradeText;
        pulse(els.grade);
      }
    } else {
      els.grade.textContent = '--';
    }

    if (SHOW_POWER && data.power != null && data.power > 0) {
      var pz = getZone(data.power, FTP, powerZones);
      els.powerBar.style.width = getZoneFill(data.power, FTP, pz) + '%';
      els.powerBar.style.background = 'linear-gradient(90deg, ' + pz.color + ', rgba(255,255,255,0.95))';
      els.power.style.color = pz.color;
      setMetricSub(els.powerZone, pz.name);
      els.powerZone.style.color = pz.color;
    } else if (SHOW_POWER) {
      els.powerBar.style.width = '0%';
      els.powerBar.style.background = '';
      els.power.style.color = '';
      setMetricSub(els.powerZone, '');
      els.powerZone.style.color = '';
    }

    if (SHOW_HR && data.hr != null && data.hr > 0) {
      var hz = getZone(data.hr, MAX_HR, hrZones);
      els.hrBar.style.width = getZoneFill(data.hr, MAX_HR, hz) + '%';
      els.hrBar.style.background = 'linear-gradient(90deg, ' + hz.color + ', rgba(255,255,255,0.95))';
      els.hr.style.color = hz.color;
      setMetricSub(els.hrZone, hz.name);
      els.hrZone.style.color = hz.color;
    } else if (SHOW_HR) {
      els.hrBar.style.width = '0%';
      els.hrBar.style.background = '';
      els.hr.style.color = '';
      setMetricSub(els.hrZone, '');
      els.hrZone.style.color = '';
    }

    if (SHOW_MAP) {
      updateMap(data.lat, data.lng);
    }
  }

  var pollInterval = null;
  var pollFailures = 0;

  function pollMetrics() {
    fetch('/metrics', { cache: 'no-store' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        pollFailures = 0;
        els.status.textContent = '';
        els.status.className = 'status';
        updateMetrics(data);
      })
      .catch(function() {
        pollFailures++;
        els.status.textContent = 'polling';
        els.status.className = 'status disconnected';
      });
  }

  function startPolling() {
    if (pollInterval) return;
    pollMetrics();
    pollInterval = setInterval(pollMetrics, 1000);
  }

  startPolling();
})();
</script>
</body>
</html>
