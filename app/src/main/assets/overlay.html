<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karoo Live Metrics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --shell-bg: rgba(8, 12, 16, 0.56);
    --shell-border: rgba(255, 255, 255, 0.08);
    --shell-shadow: rgba(0, 0, 0, 0.22);
    --text-main: #f5f8fa;
    --text-soft: rgba(245, 248, 250, 0.76);
    --text-dim: rgba(245, 248, 250, 0.42);
    --power: #f2c44d;
    --hr: #37d48a;
    --climb: #ff6a56;
    --descent: #58c3dd;
    --neutral: rgba(245, 248, 250, 0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: transparent;
    color: var(--text-main);
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .overlay {
    position: fixed;
    inset: 0;
    padding: 15px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px;
    pointer-events: none;
  }

  .metrics-shell {
    width: clamp(240px, 36vw, 351px);
    display: grid;
    gap: 7px;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 7px;
  }

  .metrics-grid > .metric-card {
    grid-column: span 2;
  }

  .metrics-grid > .metric-card:nth-child(-n+2) {
    grid-column: span 3;
  }

  .metric-card {
    position: relative;
    min-height: 89px;
    padding: 11px 11px 9px;
    border-radius: 14px;
    background: var(--shell-bg);
    border: 1px solid var(--shell-border);
    backdrop-filter: blur(14px);
    box-shadow:
      0 16px 36px var(--shell-shadow),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    overflow: hidden;
  }

  .metric-card::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 3px;
    background: rgba(255, 255, 255, 0.3);
  }

  .metric-card.power::before { background: var(--power); }
  .metric-card.hr::before { background: var(--hr); }
  .metric-card.grade::before { background: var(--climb); }
  .metric-card.speed::before { background: #6fb8ff; }
  .metric-card.distance::before { background: #9e8bff; }
  .metric-label {
    margin-bottom: 6px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .metric-main {
    display: flex;
    align-items: flex-end;
    gap: 3px;
  }

  .metric-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    line-height: 0.88;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    transition: opacity 0.15s ease;
  }

  .metric-value.updated {
    opacity: 0.72;
  }

  .metric-unit {
    padding-bottom: 4px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-soft);
  }

  .metric-sub {
    margin-top: 7px;
    min-height: 14px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  .bar-track {
    margin-top: 7px;
    height: 4px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    transition: width 0.3s ease, background-color 0.3s ease;
  }

  .power .metric-value,
  .power .metric-sub { color: var(--power); }

  .hr .metric-value,
  .hr .metric-sub { color: var(--hr); }

  .grade .metric-value.grade-positive { color: var(--climb); }
  .grade .metric-value.grade-negative { color: var(--descent); }
  .grade .metric-value.grade-flat { color: var(--neutral); }

  .map-panel {
    width: clamp(110px, 14vw, 160px);
    padding: 6px;
    border-radius: 16px;
    background: rgba(8, 12, 16, 0.44);
    border: 1px solid rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(14px);
    box-shadow: 0 18px 42px rgba(0, 0, 0, 0.18);
    display: none;
  }

  .map-panel.visible {
    display: block;
  }

  .map-shell {
    position: relative;
    width: 100%;
    height: 109px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
  }

  .map-gradient {
    position: absolute;
    inset: 0;
    z-index: 450;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(4, 8, 12, 0.16), transparent 36%),
      linear-gradient(0deg, rgba(4, 8, 12, 0.34), transparent 28%);
  }

  #map {
    width: 100%;
    height: 100%;
    filter: saturate(0.82) contrast(1.03) brightness(0.92);
  }

  .map-fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(245, 248, 250, 0.76);
    background: rgba(8, 12, 16, 0.72);
    backdrop-filter: blur(8px);
    z-index: 500;
  }

  .map-panel.unavailable .map-fallback {
    display: flex;
  }

  .status {
    position: fixed;
    left: 24px;
    bottom: 8px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245, 248, 250, 0.24);
  }

  .status.disconnected {
    color: rgba(255, 112, 112, 0.46);
  }

  .leaflet-control-attribution,
  .leaflet-control-zoom {
    display: none;
  }

  .rider-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #d4fff5, #17c6b5 60%, #0b766d 100%);
    border: 2px solid rgba(255, 255, 255, 0.92);
    box-shadow:
      0 0 0 7px rgba(23, 198, 181, 0.1),
      0 0 22px rgba(23, 198, 181, 0.28);
  }

</style>
</head>
<body>
  <div class="overlay">
    <div class="metrics-shell">
      <div class="metrics-grid">
        <div class="metric-card power" id="power-card">
          <div class="metric-label">Power</div>
          <div class="metric-main">
            <div class="metric-value" id="power">--</div>
            <div class="metric-unit">W</div>
          </div>
          <div class="bar-track"><div class="bar-fill" id="power-bar"></div></div>
          <div class="metric-sub" id="power-zone"></div>
          <div class="metric-sub" id="power-avg"></div>
        </div>

        <div class="metric-card hr" id="hr-card">
          <div class="metric-label">Heart Rate</div>
          <div class="metric-main">
            <div class="metric-value" id="hr">--</div>
            <div class="metric-unit">bpm</div>
          </div>
          <div class="bar-track"><div class="bar-fill" id="hr-bar"></div></div>
          <div class="metric-sub" id="hr-zone"></div>
        </div>

        <div class="metric-card speed">
          <div class="metric-label">Speed</div>
          <div class="metric-main">
            <div class="metric-value" id="speed">--</div>
            <div class="metric-unit">km/h</div>
          </div>
          <div class="metric-sub" id="avgSpeed">Avg -- km/h</div>
        </div>

        <div class="metric-card distance">
          <div class="metric-label">Distance</div>
          <div class="metric-main">
            <div class="metric-value" id="dist">--</div>
            <div class="metric-unit">km</div>
          </div>
          <div class="metric-sub"></div>
        </div>

        <div class="metric-card grade">
          <div class="metric-label">Grade</div>
          <div class="metric-main">
            <div class="metric-value grade-flat" id="grade">--</div>
            <div class="metric-unit">%</div>
          </div>
          <div class="metric-sub" id="elevGain">Elev Gain -- m</div>
        </div>

      </div>
    </div>

    <div class="map-panel" id="map-panel">
      <div class="map-shell">
        <div class="map-gradient"></div>
        <div id="map"></div>
        <div class="map-fallback" id="map-fallback">Map unavailable</div>
      </div>
    </div>
  </div>
  <div class="status" id="status"></div>

<script>
(function() {
  var FTP = 250;
  var MAX_HR = 187;
  var SHOW_MAP = false;
  var SHOW_POWER = true;
  var SHOW_HR = true;
  var MAX_TRAIL_POINTS = 250;
  var MAP_EDGE_PADDING = -0.35;

  var powerZones = [
    { name: 'Z1 Recovery', min: 0, max: 0.55, color: '#94a3b8' },
    { name: 'Z2 Endurance', min: 0.55, max: 0.75, color: '#3b82f6' },
    { name: 'Z3 Tempo', min: 0.75, max: 0.90, color: '#22c55e' },
    { name: 'Z4 Threshold', min: 0.90, max: 1.05, color: '#eab308' },
    { name: 'Z5 VO2max', min: 1.05, max: 1.20, color: '#f97316' },
    { name: 'Z6 Anaerobic', min: 1.20, max: 1.50, color: '#ef4444' },
    { name: 'Z7 Sprint', min: 1.50, max: 9.99, color: '#a855f7' }
  ];

  var hrZones = [
    { name: 'Z1 Recovery', min: 0, max: 0.60, color: '#94a3b8' },
    { name: 'Z2 Aerobic', min: 0.60, max: 0.70, color: '#3b82f6' },
    { name: 'Z3 Tempo', min: 0.70, max: 0.80, color: '#22c55e' },
    { name: 'Z4 Threshold', min: 0.80, max: 0.90, color: '#eab308' },
    { name: 'Z5 VO2max', min: 0.90, max: 1.00, color: '#ef4444' }
  ];

  function getZone(value, reference, zones) {
    var pct = value / reference;
    for (var i = zones.length - 1; i >= 0; i--) {
      if (pct >= zones[i].min) return zones[i];
    }
    return zones[0];
  }

  function getZoneFill(value, reference, zone) {
    var pct = value / reference;
    var range = zone.max - zone.min;
    if (range <= 0) return 100;
    var progress = (pct - zone.min) / range;
    return Math.min(Math.max(progress * 100, 15), 100);
  }

  var els = {
    speed: document.getElementById('speed'),
    avgSpeed: document.getElementById('avgSpeed'),
    power: document.getElementById('power'),
    hr: document.getElementById('hr'),
    dist: document.getElementById('dist'),
    grade: document.getElementById('grade'),
    elevGain: document.getElementById('elevGain'),
    powerCard: document.getElementById('power-card'),
    hrCard: document.getElementById('hr-card'),
    powerBar: document.getElementById('power-bar'),
    powerZone: document.getElementById('power-zone'),
    powerAvg: document.getElementById('power-avg'),
    hrBar: document.getElementById('hr-bar'),
    hrZone: document.getElementById('hr-zone'),
    status: document.getElementById('status'),
    mapPanel: document.getElementById('map-panel'),
    mapFallback: document.getElementById('map-fallback')
  };

  var map = null;
  var riderMarker = null;
  var routeTrail = null;
  var trailPoints = [];
  var mapReady = false;
  var mapUnavailable = false;
  var updateTimers = {};
  var lastSnapshot = null;

  if (!SHOW_MAP && els.mapPanel && els.mapPanel.parentNode) {
    els.mapPanel.parentNode.removeChild(els.mapPanel);
    els.mapPanel = null;
  }

  if (!SHOW_POWER) {
    if (els.powerCard && els.powerCard.parentNode) {
      els.powerCard.parentNode.removeChild(els.powerCard);
    }
  }

  if (!SHOW_HR && els.hrCard && els.hrCard.parentNode) {
    els.hrCard.parentNode.removeChild(els.hrCard);
  }

  function pulse(el) {
    if (!el) return;
    el.classList.add('updated');
    if (updateTimers[el.id]) {
      clearTimeout(updateTimers[el.id]);
    }
    updateTimers[el.id] = setTimeout(function() {
      el.classList.remove('updated');
    }, 150);
  }

  function setMetricValue(el, value, decimals) {
    var display = value != null ? (decimals > 0 ? value.toFixed(decimals) : Math.round(value)) : '--';
    if (el.textContent !== display) {
      el.textContent = display;
      pulse(el);
    }
  }

  function setMetricSub(el, text) {
    if (el.textContent !== text) {
      el.textContent = text;
    }
  }

  function showMapUnavailable(message) {
    if (!els.mapPanel) return;
    mapUnavailable = true;
    els.mapPanel.classList.add('visible');
    els.mapPanel.classList.add('unavailable');
    if (els.mapFallback) {
      els.mapFallback.textContent = message || 'Map unavailable';
    }
  }

  function initMap(lat, lng) {
    if (!SHOW_MAP || !els.mapPanel || mapUnavailable) return;
    if (mapReady) return;
    els.mapPanel.classList.add('visible');

    if (typeof L === 'undefined') {
      showMapUnavailable('Map library unavailable');
      return;
    }

    map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false
    }).setView([lat, lng], 11);

    var tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    });
    tileLayer.on('tileerror', function() {
      showMapUnavailable('Map tiles unavailable');
    });
    tileLayer.addTo(map);

    routeTrail = L.polyline([], {
      color: '#17c6b5',
      weight: 4,
      opacity: 0.92
    }).addTo(map);

    var riderIcon = L.divIcon({
      className: '',
      html: '<div class="rider-dot"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });
    riderMarker = L.marker([lat, lng], { icon: riderIcon }).addTo(map);

    mapReady = true;
  }

  function shouldRecenterMap(pos) {
    if (!map) return false;
    var bounds = map.getBounds();
    if (!bounds || !bounds.isValid()) return true;
    return !bounds.pad(MAP_EDGE_PADDING).contains(pos);
  }

  function updateMap(lat, lng) {
    if (!SHOW_MAP || lat == null || lng == null || mapUnavailable) return;
    if (!mapReady) { initMap(lat, lng); return; }

    var pos = [lat, lng];
    riderMarker.setLatLng(pos);
    if (shouldRecenterMap(pos)) {
      map.panTo(pos, { animate: false });
    }

    var last = trailPoints[trailPoints.length - 1];
    if (!last || Math.abs(last[0] - lat) > 0.00005 || Math.abs(last[1] - lng) > 0.00005) {
      trailPoints.push(pos);
      if (trailPoints.length > MAX_TRAIL_POINTS) {
        trailPoints.shift();
      }
      routeTrail.setLatLngs(trailPoints);
    }
  }

  function updateMetrics(data) {
    lastSnapshot = data;
    setMetricValue(els.speed, data.speed, 1);
    if (SHOW_POWER) {
      setMetricValue(els.power, data.power, 0);
    }
    if (SHOW_HR) {
      setMetricValue(els.hr, data.hr, 0);
    }
    setMetricValue(els.dist, data.dist, 1);
    if (SHOW_POWER) {
      if (data.avgPower != null) {
        setMetricSub(els.powerAvg, 'Avg ' + Math.round(data.avgPower) + ' W');
      } else {
        setMetricSub(els.powerAvg, 'Avg -- W');
      }
    }

    if (data.avgSpeed != null) {
      setMetricSub(els.avgSpeed, 'Avg ' + data.avgSpeed.toFixed(1) + ' km/h');
    } else {
      setMetricSub(els.avgSpeed, 'Avg -- km/h');
    }

    if (data.elevGain != null) {
      setMetricSub(els.elevGain, 'Elev Gain ' + Math.round(data.elevGain) + ' m');
    } else {
      setMetricSub(els.elevGain, 'Elev Gain -- m');
    }

    if (data.grade != null) {
      setMetricValue(els.grade, Math.abs(data.grade), 1);
      var gradeClass = data.grade > 0.5 ? 'grade-positive' : (data.grade < -0.5 ? 'grade-negative' : 'grade-flat');
      els.grade.className = 'metric-value ' + gradeClass;
      if (data.grade >= 0) {
        els.grade.textContent = '+' + data.grade.toFixed(1);
      } else {
        els.grade.textContent = data.grade.toFixed(1);
      }
      pulse(els.grade);
    } else {
      els.grade.className = 'metric-value grade-flat';
      els.grade.textContent = '--';
    }

    if (SHOW_POWER && data.power != null && data.power > 0) {
      var pz = getZone(data.power, FTP, powerZones);
      els.powerBar.style.width = getZoneFill(data.power, FTP, pz) + '%';
      els.powerBar.style.background = 'linear-gradient(90deg, ' + pz.color + ', rgba(255,255,255,0.95))';
      els.power.style.color = pz.color;
      setMetricSub(els.powerZone, pz.name);
      els.powerZone.style.color = pz.color;
    } else {
      els.powerBar.style.width = '0%';
      els.powerBar.style.background = '';
      els.power.style.color = '';
      setMetricSub(els.powerZone, '');
      els.powerZone.style.color = '';
    }

    if (SHOW_HR && data.hr != null && data.hr > 0) {
      var hz = getZone(data.hr, MAX_HR, hrZones);
      els.hrBar.style.width = getZoneFill(data.hr, MAX_HR, hz) + '%';
      els.hrBar.style.background = 'linear-gradient(90deg, ' + hz.color + ', rgba(255,255,255,0.95))';
      els.hr.style.color = hz.color;
      setMetricSub(els.hrZone, hz.name);
      els.hrZone.style.color = hz.color;
    } else {
      els.hrBar.style.width = '0%';
      els.hrBar.style.background = '';
      els.hr.style.color = '';
      setMetricSub(els.hrZone, '');
      els.hrZone.style.color = '';
    }

    if (SHOW_MAP) {
      updateMap(data.lat, data.lng);
    }
  }

  var ws = null;
  var reconnectDelay = 2000;
  var wsFailCount = 0;
  var pollInterval = null;

  function connectWebSocket() {
    var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + location.host);

    ws.onopen = function() {
      wsFailCount = 0;
      reconnectDelay = 2000;
      els.status.textContent = '';
      els.status.className = 'status';
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    };

    ws.onmessage = function(event) {
      try {
        updateMetrics(JSON.parse(event.data));
      } catch (e) {}
    };

    ws.onclose = function() {
      ws = null;
      wsFailCount++;
      els.status.textContent = 'reconnecting';
      els.status.className = 'status disconnected';
      if (wsFailCount >= 3) {
        startPolling();
      } else {
        setTimeout(connectWebSocket, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
      }
    };

    ws.onerror = function() {
      if (ws) ws.close();
    };
  }

  function startPolling() {
    els.status.textContent = 'polling';
    if (pollInterval) return;
    pollInterval = setInterval(function() {
      fetch('/metrics')
        .then(function(r) { return r.json(); })
        .then(updateMetrics)
        .catch(function() {});
    }, 1000);
    setTimeout(function() {
      if (!ws) {
        wsFailCount = 0;
        connectWebSocket();
      }
    }, 15000);
  }

  connectWebSocket();
})();
</script>
</body>
</html>
